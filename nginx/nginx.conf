###############################################################################
# PLEASUREDAI OS — Nginx Reverse Proxy Configuration
# Single entry point on port 80 with token-based authentication
###############################################################################

worker_processes auto;
error_log /var/log/nerv/nginx_error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nerv/nginx_access.log main;

    # ── Performance ──────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 2G;  # Allow large file uploads (models, videos)
    proxy_read_timeout 600s;  # Long timeout for video generation
    proxy_send_timeout 600s;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── WebSocket Upgrade Map ────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Main Server ──────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # ── NERV Web UI (frontend) ───────────────────────────────────────
        # Root path serves the NERV-themed dashboard
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── ComfyUI API (proxied) ───────────────────────────────────────
        # All /api/* requests forward to ComfyUI
        location /api/ {
            proxy_pass http://127.0.0.1:8188/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            
            # WebSocket support (required for ComfyUI real-time updates)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Long timeouts for generation
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── ComfyUI WebSocket ───────────────────────────────────────────
        location /ws {
            proxy_pass http://127.0.0.1:8188/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s; # Keep WebSocket alive for 24h
        }

        # ── ComfyUI Direct Access ───────────────────────────────────────
        # For users who want to access ComfyUI natively
        location /comfyui/ {
            proxy_pass http://127.0.0.1:8188/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 600s;
        }

        # ── Static Output Files ─────────────────────────────────────────
        # Serve generated images/videos directly
        location /output/ {
            alias /opt/comfyui/output/;
            autoindex on;
            expires 1d;
        }

        # ── Health Check Endpoint ────────────────────────────────────────
        location /health {
            proxy_pass http://127.0.0.1:8188/system_stats;
            proxy_set_header Host $host;
        }

        # ── Block sensitive paths ────────────────────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
