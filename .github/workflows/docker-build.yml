###############################################################################
# PLEASUREDAI OS — GitHub Actions: Build & Push to Docker Hub
#
# Builds the Docker image on GitHub's servers (free) and pushes to:
#   docker.io/m842/pleasured_ai:latest
#
# Triggers:
#   - Every push to 'main' branch
#   - Manual trigger from GitHub Actions tab
#
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  = m842
#   DOCKERHUB_TOKEN     = your Docker Hub access token
###############################################################################

name: Build & Push Docker Image

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allows manual trigger from GitHub UI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: m842/pleasured_ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (multi-platform builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Extract metadata (tags, labels)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      # 5. Build and push the image
      #    Uses GitHub Actions cache to speed up subsequent builds
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          # Build args can be added here if needed:
          # build-args: |
          #   SOME_ARG=value

      # 6. Output the image digest
      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }} — digest ${{ steps.build-and-push.outputs.digest }}"
